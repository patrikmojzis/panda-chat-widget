services:
  postgres:
    image: postgres:17-alpine
    ports:
      - "127.0.0.1:5432:5432"
    environment:
      POSTGRES_USER: panda_chat_widget
      POSTGRES_PASSWORD: panda_chat_widget
      POSTGRES_DB: panda_chat_widget
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
