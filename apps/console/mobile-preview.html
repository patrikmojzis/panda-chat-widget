<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Panda Chat Console mobile visual preview</title>
    <style>
      * { box-sizing: border-box; }
      body { min-height: 100vh; display: grid; place-items: start center; margin: 0; padding: 24px; background: #eef0f3; }
      iframe { width: 390px; max-width: 100%; height: 760px; border: 0; border-radius: 18px; background: white; box-shadow: 0 20px 60px rgb(15 23 42 / 18%); }
    </style>
  </head>
  <body>
    <iframe id="preview" title="Mobile console preview"></iframe>
    <script>
      const iframe = document.getElementById('preview');
      iframe.src = new URLSearchParams(window.location.search).has('settings') ? './preview.html?settings=1' : './preview.html';
    </script>
  </body>
</html>
