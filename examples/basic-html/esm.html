<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Panda Chat Widget ESM demo</title>
    <style>
      :root {
        color-scheme: light;
        font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }

      body {
        margin: 0;
        min-height: 100vh;
        background: #f8fafc;
        color: #0f172a;
      }

      main {
        margin: 0 auto;
        max-width: 720px;
        padding: 48px 24px;
      }

      code {
        background: #e2e8f0;
        border-radius: 6px;
        padding: 2px 6px;
      }

      button {
        appearance: none;
        border: 1px solid #cbd5e1;
        border-radius: 8px;
        background: #ffffff;
        color: #0f172a;
        cursor: pointer;
        font: inherit;
        font-size: 14px;
        padding: 8px 16px;
        margin: 4px;
      }

      button:hover {
        background: #f1f5f9;
      }

      pre {
        background: #1e293b;
        color: #e2e8f0;
        border-radius: 8px;
        padding: 16px;
        overflow-x: auto;
        font-size: 13px;
      }
    </style>
  </head>
  <body>
    <main>
      <h1>Panda Chat Widget ESM demo</h1>
      <p>This page uses the side-effect-free ESM factory to control the widget lifecycle.</p>
      <p>Uses temporary iframe-load readiness (S1). S2 replaces the readiness adapter with validated handshake + shell-ready.</p>

      <div>
        <button id="btn-init">Init</button>
        <button id="btn-open">Open</button>
        <button id="btn-close">Close</button>
        <button id="btn-toggle">Toggle</button>
        <button id="btn-destroy">Destroy</button>
        <button id="btn-reinit">Re-init</button>
      </div>

      <pre id="state-log">Loading ESM module...</pre>
    </main>

    <script type="module">
      import { createPandaChatWidget } from './vendor/index.js';

      const widget = createPandaChatWidget();
      const log = document.getElementById('state-log');

      widget.subscribe((state) => {
        log.textContent = JSON.stringify(state, null, 2);
      });

      document.getElementById('btn-init').addEventListener('click', () => {
        widget.init({ publicKey: 'demo-local-widget' }).catch((e) => {
          log.textContent = 'Init error: ' + JSON.stringify(e.toJSON(), null, 2);
        });
      });

      document.getElementById('btn-open').addEventListener('click', () => {
        try { widget.open(); } catch (e) { log.textContent = 'Error: ' + e.message; }
      });

      document.getElementById('btn-close').addEventListener('click', () => {
        try { widget.close(); } catch (e) { log.textContent = 'Error: ' + e.message; }
      });

      document.getElementById('btn-toggle').addEventListener('click', () => {
        try { widget.toggle(); } catch (e) { log.textContent = 'Error: ' + e.message; }
      });

      document.getElementById('btn-destroy').addEventListener('click', () => {
        widget.destroy();
      });

      document.getElementById('btn-reinit').addEventListener('click', () => {
        widget.init({ publicKey: 'demo-local-widget' }).catch((e) => {
          log.textContent = 'Init error: ' + JSON.stringify(e.toJSON(), null, 2);
        });
      });
    </script>
  </body>
</html>
